name: news_app
description: Way2News-style news app with reporter, user, and admin roles.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.1.0
  http_parser: ^4.0.2

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^12.1.3

  # Media
  image_picker: ^1.0.7
  video_player: ^2.8.2
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Notifications
  firebase_core: ^2.25.4
  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^21.0.0

  # UI helpers
  timeago: ^3.6.0
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  flutter_svg: ^2.0.9
  badges: ^3.1.2

  # Socket.io
  socket_io_client: ^2.0.3+1

  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/.env
    - assets/images/
    - assets/icons/